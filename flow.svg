<svg width="900" height="600" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9c4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e1f5fe;stop-opacity:1" />
    </linearGradient>

    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444" />
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#28a745" />
    </marker>
  </defs>

  <style>
    .flow-line {
      fill: none;
      stroke: #444;
      stroke-width: 2.5;
      stroke-dasharray: 10;
      animation: dash 1.5s linear infinite;
    }
    .internal-flow {
      fill: none;
      stroke: #28a745;
      stroke-width: 2;
      stroke-dasharray: 8;
      animation: dash 1s linear infinite;
    }
    @keyframes dash {
      to { stroke-dashoffset: -20; }
    }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #333; }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #24292e; }
    .code-text { font-family: 'Courier New', monospace; font-size: 12px; fill: #444; }
  </style>

  <rect width="900" height="600" fill="url(#bgGradient)" rx="15"/>

  <rect x="50" y="250" width="180" height="80" rx="10" fill="#ffffff" stroke="#fbc02d" stroke-width="2.5"/>
  <path d="M95,265 c-3.3,0-3.1,1.4-3.1,1.4 l0,1.5 l3.2,0 l0,0.4 l-4.5,0 c-1.5,0-3.1,1.3-3.1,3.1 l0,5 c0,1.8,1.3,3.3,3.1,3.3 l1.8,0 l0-2.5 c0-1.8,1.5-3.3,3.3-3.3 l5.2,0 c1.8,0,3.1-1.3,3.1-3.1 l0-4 c0-1.8-1.5-3.3-3.3-3.3 z" fill="#3776ab"/>
  <text x="140" y="295" class="label" text-anchor="middle" font-weight="bold">Local Development</text>
  <text x="140" y="315" class="code-text" text-anchor="middle">git push</text>

  <rect x="320" y="50" width="340" height="480" rx="15" fill="#ffffff" fill-opacity="0.8" stroke="#24292e" stroke-width="2" stroke-dasharray="5,5"/>
  <path d="M490,65 a12,12 0 0,0 -3.8,23.4 c0.6,0.1 0.8-0.3 0.8-0.6 v-2 c-3.3,0.7-4-1.6-4-1.6 c-0.5-1.4-1.3-1.8-1.3-1.8 c-1.1-0.7,0.1-0.7,0.1-0.7 c1.2,0.1,1.8,1.3,1.8,1.3 c1.1,1.8,2.8,1.3,3.5,1 c0.1-0.8,0.4-1.3,0.8-1.7 c-2.7-0.3-5.5-1.3-5.5-5.9 c0-1.3,0.5-2.4,1.2-3.2 c-0.1-0.3-0.5-1.5,0.1-3.2 c0,0,1-0.3,3.3,1.2 a11,11 0 0,1 6,0 c2.3-1.5,3.3-1.2,3.3-1.2 c0.6,1.7,0.2,2.9,0.1,3.2 c0.8,0.8,1.2,1.9,1.2,3.2 c0,4.6-2.8,5.6-5.5,5.9 c0.4,0.4,0.8,1.1,0.8,2.1 v3.1 c0,0.3,0.2,0.7,0.8,0.6 a12,12 0 0,0 -3.8-23.4" fill="#24292e"/>
  <text x="490" y="115" class="title" text-anchor="middle">GitHub Action Triggered</text>

  <rect x="345" y="150" width="290" height="110" rx="8" fill="#f8f9fa" stroke="#e1e4e8" stroke-width="2"/>
  <text x="360" y="175" class="label" font-weight="bold" fill="#28a745">Job: build-and-test</text>
  <text x="370" y="200" class="code-text">• setup-python@v5</text>
  <text x="370" y="220" class="code-text">• pip install requirements</text>
  <text x="370" y="240" class="code-text">• python -m pytest</text>

  <rect x="345" y="360" width="290" height="110" rx="8" fill="#f8f9fa" stroke="#e1e4e8" stroke-width="2"/>
  <text x="360" y="385" class="label" font-weight="bold" fill="#28a745">Job: build-and-push</text>
  <text x="370" y="410" class="code-text">• login-action@v3</text>
  <text x="370" y="430" class="code-text">• build-push-action@v5</text>
  <text x="370" y="450" class="code-text">• target: sush0703/flask-app</text>

  <rect x="730" y="250" width="140" height="100" rx="10" fill="#ffffff" stroke="#0db7ed" stroke-width="2.5"/>
  <path d="M785,265 h4 v4 h-4 z M790,265 h4 v4 h-4 z M785,270 h4 v4 h-4 z M790,270 h4 v4 h-4 z M795,270 h4 v4 h-4 z M780,270 h4 v4 h-4 z" fill="#0db7ed"/>
  <text x="800" y="305" class="label" text-anchor="middle" font-weight="bold" fill="#007bff">Docker Hub</text>
  <text x="800" y="325" class="code-text" text-anchor="middle">Port: 8080</text>

  <path d="M 230 290 L 320 290" class="flow-line" marker-end="url(#arrowhead)"/>
  <path d="M 490 260 L 490 360" class="internal-flow" marker-end="url(#arrowhead-green)"/>
  <path d="M 635 415 L 660 415" class="internal-flow" marker-end="url(#arrowhead-green)"/>
  <path d="M 660 415 L 800 415 L 800 350" class="flow-line" marker-end="url(#arrowhead)"/>
</svg>